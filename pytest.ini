[pytest]
# Run from repo root: pytest
# With coverage:      pytest --cov=src --cov-report=term-missing

testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Show short test summary for failures and errors
addopts =
    -v
    --tb=short
    --strict-markers

# Custom markers (avoid PytestUnknownMarkWarning)
markers =
    slow: mark test as slow (deselect with -m "not slow")
    integration: mark test as requiring external resources (dataset, model)
